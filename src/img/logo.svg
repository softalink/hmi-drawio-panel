<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- pipes (drawn under the equipment) -->
  <g fill="none" stroke="#9aa0a6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M39 32 H61"/>
    <path d="M74 45 V78 H62"/>
  </g>
  <!-- flow-direction arrows -->
  <g fill="#6b7177">
    <polygon points="55,28 55,36 62,32"/>
    <polygon points="65,74 65,82 58,78"/>
  </g>

  <!-- tank with liquid level (status: green) -->
  <rect x="12" y="20" width="27" height="42" rx="5" fill="#ffffff" stroke="#2b3a4a" stroke-width="2" stroke-linejoin="round"/>
  <path d="M13 40 H38 V57 a4 4 0 0 1 -4 4 H17 a4 4 0 0 1 -4 -4 Z" fill="#73bf69"/>
  <line x1="13" y1="40" x2="38" y2="40" stroke="#2b3a4a" stroke-width="2"/>

  <!-- pump (status: amber) -->
  <circle cx="74" cy="32" r="13" fill="#ff9830" stroke="#2b3a4a" stroke-width="2"/>
  <polygon points="70,26 70,38 83,32" fill="#ffffff"/>

  <!-- gauge -->
  <circle cx="49" cy="78" r="12" fill="#ffffff" stroke="#2b3a4a" stroke-width="2"/>
  <circle cx="42.07" cy="74" r="1.6" fill="#73bf69"/>
  <circle cx="49" cy="70" r="1.6" fill="#ff9830"/>
  <circle cx="55.93" cy="74" r="1.6" fill="#f2495c"/>
  <line x1="49" y1="78" x2="46.6" y2="71.4" stroke="#2b3a4a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="49" cy="78" r="2" fill="#2b3a4a"/>
</svg>
