# Builds and releases the plugin when a v* tag is pushed.
# Produces a SLSA build provenance attestation so plugincheck2 can verify the
# build origin (resolves the no-provenance-attestation finding).
# See https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          attestation: true
          node-version: '24'
